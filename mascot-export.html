<!DOCTYPE html>
<html>
<head><title>Mascot PNG Export</title></head>
<body style="background:#ccc;display:flex;gap:40px;padding:40px;flex-wrap:wrap;align-items:start;font-family:system-ui">

<div>
  <h3>Wink (for paywall)</h3>
  <canvas id="c1" width="264" height="264"></canvas>
  <br><button onclick="download('c1','mascot-wink.png')">Download PNG</button>
</div>

<div>
  <h3>Happy</h3>
  <canvas id="c2" width="264" height="264"></canvas>
  <br><button onclick="download('c2','mascot-happy.png')">Download PNG</button>
</div>

<div>
  <h3>Wink with glow</h3>
  <canvas id="c3" width="264" height="264"></canvas>
  <br><button onclick="download('c3','mascot-wink-glow.png')">Download PNG</button>
</div>

<script>
const mascotSVG = (expression, glow) => `
<svg xmlns="http://www.w3.org/2000/svg" width="264" height="264" viewBox="${glow ? '-10 -10 120 120' : '0 0 100 100'}">
  ${glow ? '<circle cx="50" cy="50" r="56" fill="#E8FAF8" opacity="0.5"/>' : ''}
  <!-- Body — sensor disc -->
  <circle cx="50" cy="50" r="46" fill="#FFFFFF" stroke="#D8DCE4" stroke-width="1.5"/>
  <circle cx="50" cy="50" r="38" fill="none" stroke="#E8EBF0" stroke-width="1"/>
  <!-- Sensor nub on top -->
  <rect x="44" y="6" width="12" height="6" rx="3" fill="#D0D5DE"/>
  <!-- Eyebrows -->
  <path d="M33 40Q38 37 43 40" stroke="#C0C6D0" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  <path d="M57 40Q62 37 67 40" stroke="#C0C6D0" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  <!-- Left eye -->
  <ellipse cx="38" cy="48" rx="5" ry="6" fill="#0F2027"/>
  <circle cx="40" cy="46" r="1.8" fill="#FFFFFF"/>
  <!-- Right eye -->
  ${expression === 'wink'
    ? '<path d="M57 47Q62 45 67 47" stroke="#0F2027" stroke-width="1.8" stroke-linecap="round" fill="none"/>'
    : '<ellipse cx="62" cy="48" rx="5" ry="6" fill="#0F2027"/><circle cx="64" cy="46" r="1.8" fill="#FFFFFF"/>'
  }
  <!-- Smile -->
  <path d="M43 56Q50 62 57 56" stroke="#0F2027" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Blush cheeks -->
  <circle cx="32" cy="54" r="4" fill="#FBCCC4" opacity="0.7"/>
  <circle cx="68" cy="54" r="4" fill="#FBCCC4" opacity="0.7"/>
</svg>`;

function renderToCanvas(canvasId, expression, glow) {
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext('2d');
  const img = new Image();
  const svg = mascotSVG(expression, glow);
  const blob = new Blob([svg], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  img.onload = () => {
    ctx.clearRect(0, 0, 264, 264);
    ctx.drawImage(img, 0, 0, 264, 264);
    URL.revokeObjectURL(url);
  };
  img.src = url;
}

function download(canvasId, filename) {
  const canvas = document.getElementById(canvasId);
  const link = document.createElement('a');
  link.download = filename;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

renderToCanvas('c1', 'wink', false);
renderToCanvas('c2', 'happy', false);
renderToCanvas('c3', 'wink', true);
</script>
</body>
</html>
